name: CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build_test_and_analysis:
    name: Build, Test, Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain + analyzers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang-tidy \
            clang-tools \
            llvm \
            cppcheck \
            pkg-config \
            libmbedtls-dev

      - name: Verify tool versions
        run: |
          which scan-build && scan-build --version || true
          clang-tidy --version
          cppcheck --version

      - name: Build + run tests
        run: |
          make run_tests

      - name: Static analysis (clang-tidy + cppcheck + scan-build)
        run: |
          make static_analysis

  codeql:
    name: CodeQL (C/C++)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            pkg-config \
            libmbedtls-dev

      # Replace autobuild with explicit build so CodeQL can observe compilation.
      - name: Build
        run: |
          make clean
          make all

      - name: Analyze
        uses: github/codeql-action/analyze@v3
