name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_test_and_analysis:
    name: Build, Test, Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain + analyzers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang-tidy \
            clang-tools \
            llvm \
            cppcheck \
            pkg-config \
            libmbedtls-dev

      - name: Verify tool versions
        run: |
          which scan-build && scan-build --version || true
          clang-tidy --version
          cppcheck --version

      - name: Build + run tests
        run: |
          make run_tests

      - name: Static analysis (clang-tidy + cppcheck + scan-build)
        run: |
          make static_analysis
