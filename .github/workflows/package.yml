name: Package

# ─────────────────────────────────────────────────────────────────────────────
# Manual-only trigger.  Run from the GitHub Actions tab → "Run workflow".
# Supply an optional branch, tag, or commit SHA to build; defaults to main.
# Produces two tarballs (Linux x86_64 and macOS arm64) and attaches them to
# a version-tagged GitHub Release.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build tarballs — one job per platform, run in parallel.
  # ─────────────────────────────────────────────────────────────────────────────
  build-package:
    name: Build package — ${{ matrix.os_label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (glibc) ─────────────────────────────────────────
          - runner:   ubuntu-22.04
            os_label: Linux x86_64
            os_tag:   linux-x86_64

          # ── macOS arm64 (Apple Silicon, M1/M2/M3) ────────────────────────
          - runner:   macos-14
            os_label: macOS arm64
            os_tag:   macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      # ── Linux toolchain ──────────────────────────────────────────────────
      - name: Install toolchain (Linux x86_64)
        if: matrix.os_tag == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libmbedtls-dev

      # ── macOS toolchain ──────────────────────────────────────────────────
      - name: Install toolchain (macOS arm64)
        if: matrix.os_tag == 'macos-arm64'
        run: |
          brew install mbedtls pkg-config

      # ── Read version from source ─────────────────────────────────────────
      - name: Extract version
        id: ver
        run: |
          VER=$(grep 'ME_VERSION_STRING\[\]' src/core/Version.hpp \
                | sed 's/.*"\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)".*/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      # ── Build static + shared libraries ─────────────────────────────────
      - name: Build release libraries
        run: make RELEASE=1 libs

      # ── Stage and pack ───────────────────────────────────────────────────
      - name: Create distribution tarball
        run: make RELEASE=1 package

      # ── Rename for matrix disambiguation ────────────────────────────────
      # The Makefile produces: build/messageengine-vVER-OS-ARCH.tar.gz
      # (with a 'v' prefix and the OS/arch already embedded).
      # We glob for the actual file, then rename to the canonical convention:
      #   messageengine-VER-OS_TAG.tar.gz  (no 'v'; standardised OS tag).
      - name: Rename tarball
        id: tarball
        run: |
          VER="${{ steps.ver.outputs.version }}"
          OS_TAG="${{ matrix.os_tag }}"
          SRC=$(ls build/messageengine-v${VER}-*.tar.gz | head -1)
          DST="build/messageengine-${VER}-${OS_TAG}.tar.gz"
          mv "$SRC" "$DST"
          echo "path=$DST" >> "$GITHUB_OUTPUT"
          echo "name=messageengine-${VER}-${OS_TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      # ── Upload as workflow artifact ──────────────────────────────────────
      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tarball.outputs.name }}
          path: ${{ steps.tarball.outputs.path }}
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create a version-tagged GitHub Release and attach both tarballs.
  # Runs once after both platform builds succeed.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - name: Checkout (for version read)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Extract version
        id: ver
        run: |
          VER=$(grep 'ME_VERSION_STRING\[\]' src/core/Version.hpp \
                | sed 's/.*"\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)".*/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifact subdirs
        run: |
          find dist/ -name "*.tar.gz" -exec mv {} dist/ \; 2>/dev/null || true
          find dist/ -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
          ls -lh dist/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: messageEngine v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
